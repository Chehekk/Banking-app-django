<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block head_title %}{{ title }}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal">
    <!--{% extends 'core/base.html' %}

    {% block content %}-->
    <h1 class="font-mono font-bold text-3xl text-center pb-5 pt-10">{{ title }}</h1>
    <hr />
    <div class="w-full mt-5">
        <form method="post" class="bg-white shadow-md rounded px-8 pt-6 pb-8 mb-4">
            <!--{% csrf_token %}-->

            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="amount">
                    Amount
                </label>
                <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight border rounded-md border-gray-500 focus:outline-none focus:shadow-outline" name="amount" id="amount" type="number" required placeholder="Amount">
            </div>
            <!--{% if form.amount.errors %}
                {% for error in form.amount.errors %}-->
                    <p class="text-red-600 text-sm italic pb-2"><!--{{ error }}</p>
                {% endfor %}
            {% endif %}-->
            <button class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline" type="submit">
                Submit
            </button>
        </form>
    </div>
    <!--{% endblock %}-->
</body>
</html>
